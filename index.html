<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Besix Unitec Portal</title>

<style>

:root{
--brand:#FF7900;
}

body{
font-family:Arial,sans-serif;
margin:0;
background:#f0f2f5;
text-align:center;
padding-top:110px;
}

/* logos */

.logo-left{
position:absolute;
top:10px;
left:10px;
width:120px;
}

.logo-right{
position:absolute;
top:10px;
right:10px;
width:180px;
}

/* language */

.language-options{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.language-options label{
background:white;
padding:8px 16px;
border-radius:8px;
cursor:pointer;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

/* tiles */

.tiles{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
padding:40px;
max-width:900px;
margin:auto;
}

.tile{
background:white;
border-radius:16px;
padding:30px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-top:6px solid var(--brand);
cursor:pointer;
transition:0.2s;
}

.tile:hover{
transform:translateY(-4px);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.tile-icon{
font-size:40px;
margin-bottom:10px;
}

.tile-title{
font-size:18px;
font-weight:bold;
}

/* popup */

.popup-back{
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.popup{
background:white;
padding:25px;
border-radius:12px;
max-width:420px;
border-top:6px solid var(--brand);
}

button{
background:var(--brand);
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-top:15px;
}

button:hover{
background:#e06a00;
}

footer{
margin-top:60px;
background:#222;
color:white;
padding:15px;
font-size:14px;
}

</style>
</head>

<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/c/c8/Orange_logo.svg" class="logo-left">
<img src="https://www.threon.com/wp-content/uploads/2025/01/Mask-Group-92.png.webp" class="logo-right">

<h1>Besix Unitec</h1>

<h3 id="chooseLang">Kies taal / Choisissez la langue</h3>

<div class="language-options">
<label><input type="radio" name="language" value="nl"> Nederlands</label>
<label><input type="radio" name="language" value="fr"> Français</label>
</div>


<div class="tiles">

<div class="tile" onclick="openRapport()">
<div class="tile-icon">📝</div>
<div class="tile-title" id="tileRapport">Interventie rapport</div>
</div>

<div class="tile" onclick="openInstallHelp()">
<div class="tile-icon">📋</div>
<div class="tile-title" id="tileChecklist">Installatie checklist</div>
</div>

<div class="tile" onclick="openUsefulInfo()">
<div class="tile-icon">ℹ️</div>
<div class="tile-title" id="tileInfo">Nuttige info</div>
</div>

<div class="tile" onclick="openLanguageForm()">
<div class="tile-icon">💶</div>
<div class="tile-title" id="tileOfferte">Offerte</div>
</div>

</div>


<!-- popup -->

<div class="popup-back" id="popup">

<div class="popup">

<h3>Reminder</h3>

<p id="popupText"></p>

<button onclick="closePopup()">OK</button>

</div>

</div>

<footer>
© 2026 Besix Unitec
</footer>


<script>

/* taal opslaan */

const radios=document.querySelectorAll('input[name="language"]')

radios.forEach(r=>{
r.addEventListener("change",function(){

localStorage.setItem("portalLang",this.value)

updateLanguage()

})
})

/* taal laden */

window.addEventListener("DOMContentLoaded",()=>{

const savedLang=localStorage.getItem("portalLang")

if(savedLang){

document.querySelector(`input[value=${savedLang}]`).checked=true

}

updateLanguage()

checkPopup()

})

/* taal aanpassen */

function updateLanguage(){

const lang=document.querySelector('input[name="language"]:checked')?.value || "nl"

if(lang==="fr"){

document.getElementById("tileRapport").innerText="Rapport d'intervention"
document.getElementById("tileChecklist").innerText="Checklist installation"
document.getElementById("tileInfo").innerText="Infos utiles"
document.getElementById("tileOfferte").innerText="Devis"

}else{

document.getElementById("tileRapport").innerText="Interventie rapport"
document.getElementById("tileChecklist").innerText="Installatie checklist"
document.getElementById("tileInfo").innerText="Nuttige info"
document.getElementById("tileOfferte").innerText="Offerte"

}

}

/* links */

function openRapport(){

window.open("rapport.html", "_blank");
}


function openInstallHelp(){

window.open(
"https://besixunitec.github.io/Interventierapport/checklist",
"_blank"
)

}

function openUsefulInfo(){

window.open(
"https://besixunitec.github.io/Interventierapport/nuttigeinfo",
"_blank"
)

}

function openLanguageForm(){

const lang=document.querySelector('input[name="language"]:checked')?.value

if(!lang){

alert("Kies eerst een taal / Choisissez d'abord une langue")

return

}

if(lang==="nl"){

window.open("https://forms.gle/QAiNNHz9ouTWJku38")

}else{

window.open("https://forms.gle/5mPCu5NZmeRoUG1v8")

}

}

/* popup logic */

function checkPopup(){

const today=new Date()

const day=today.getDay()

const dateKey=today.toISOString().slice(0,10)

const shown=localStorage.getItem("popup-"+dateKey)

/*
0 zondag
1 maandag
3 woensdag
5 vrijdag
*/

if((day===1 || day===3 || day===5) && !shown){

showPopup()

localStorage.setItem("popup-"+dateKey,"1")

}

}

function showPopup(){

const lang=document.querySelector('input[name="language"]:checked')?.value

let text

if(lang==="fr"){

text="Veuillez synchroniser vos mesures avec le serveur."

}else{

text="Gelieve jullie metingen te synchroniseren met de server."

}

document.getElementById("popupText").innerText=text

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

</script>

</body>
</html>
